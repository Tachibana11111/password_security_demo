<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Secure Password Storage{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body          { background: #f8f9fa; font-size: 0.93rem; }
    .navbar-brand { font-weight: 600; letter-spacing: .3px; }
    .nav-pill-vuln  { background: #fff3cd; color: #856404 !important; border-radius: 6px; padding: 4px 12px !important; }
    .nav-pill-secure{ background: #d1e7dd; color: #0a3622 !important; border-radius: 6px; padding: 4px 12px !important; }
    .hash-mono    { font-family: monospace; font-size: 0.78rem; word-break: break-all; color: #555; }
    .badge-algo   { font-size: 0.7rem; font-weight: 500; }
    .table th     { font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
                    letter-spacing: .5px; color: #666; }
    .flash-bar    { border-radius: 0; border-left: 4px solid; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-shield-lock-fill me-2"></i>Secure Password Storage</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-2 align-items-center">
        <li class="nav-item">
          <a class="nav-link nav-pill-vuln" href="/vulnerable">
            <i class="bi bi-bug-fill me-1"></i>Vulnerable
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-pill-secure" href="/secure">
            <i class="bi bi-shield-check me-1"></i>Secure
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} flash-bar alert-dismissible fade show mb-3" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
