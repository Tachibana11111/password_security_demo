{% extends "base.html" %}
{% block title %}Secure Password Storage{% endblock %}

{% block content %}

<div class="row g-4 justify-content-center">

  <div class="col-md-6">
    <div class="card border-warning h-100">
      <div class="card-body p-4">
        <div class="d-flex align-items-center mb-3">
          <div>
            <h5 class="mb-0 fw-semibold">Vulnerable Mode</h5>
            <small class="text-muted">MD5 · SHA1 · SHA256</small>
          </div>
        </div>
        <a href="/vulnerable" class="btn btn-warning w-100">
          <i class="bi bi-bug-fill me-2"></i>Demo
        </a>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card border-success h-100">
      <div class="card-body p-4">
        <div class="d-flex align-items-center mb-3">
          <div>
            <h5 class="mb-0 fw-semibold">Secure Mode</h5>
            <small class="text-muted">bcrypt · argon2id</small>
          </div>
        </div>
        <a href="/secure" class="btn btn-success w-100">
          <i class="bi bi-shield-check me-2"></i>Demo
        </a>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card border-primary h-100">
      <div class="card-body p-4">
        <div class="d-flex align-items-center mb-3">
          <div>
            <h5 class="mb-0 fw-semibold">Benchmark</h5>
            <small class="text-muted">So sánh tốc độ & biểu đồ</small>
          </div>
        </div>
        <a href="/benchmark" class="btn btn-primary w-100">
          <i class="bi bi-bar-chart-fill me-2"></i>Benchmark
        </a>
      </div>
    </div>
  </div>

</div>
{% endblock %}
